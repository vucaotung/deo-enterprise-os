version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: deo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deo_os}
      POSTGRES_USER: ${POSTGRES_USER:-deo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      TZ: Asia/Bangkok
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deo} -d ${POSTGRES_DB:-deo_os}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: deo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    container_name: deo-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev; else echo 'API scaffold mounted but app not initialized yet' && tail -f /dev/null; fi"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-deo}:${POSTGRES_PASSWORD:-change_me_now}@postgres:5432/${POSTGRES_DB:-deo_os}
      REDIS_URL: redis://redis:6379
      TZ: Asia/Bangkok
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: deo-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev; else echo 'Web scaffold mounted but app not initialized yet' && tail -f /dev/null; fi"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      TZ: Asia/Bangkok
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    depends_on:
      - api

  worker:
    image: node:22-alpine
    container_name: deo-worker
    restart: unless-stopped
    working_dir: /app
    command: sh -c "if [ -f package.json ]; then npm install && npm run worker; else echo 'Worker scaffold mounted but app not initialized yet' && tail -f /dev/null; fi"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-deo}:${POSTGRES_PASSWORD:-change_me_now}@postgres:5432/${POSTGRES_DB:-deo_os}
      REDIS_URL: redis://redis:6379
      TZ: Asia/Bangkok
    volumes:
      - ./apps/worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: deo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
